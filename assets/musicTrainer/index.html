<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Score Follower</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <button id="sidebar-toggle" title="Toggle song list">&#9776;</button>
  <span class="brand">Score Follower</span>
  <span class="divider"></span>

  <div class="file-zone">
    <input type="file" id="fileInput" accept=".musicxml,.xml,.mxl">
    <div class="file-label" id="fileLabel">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Open Score
    </div>
  </div>
  <span class="file-name" id="fileName"></span>

  <div class="transport">
    <button class="btn btn-stop" id="btnSkipStart" disabled title="Skip to start">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="4" width="3" height="16"/><polygon points="20,4 9,12 20,20"/></svg>
    </button>
    <button class="btn btn-play" id="btnPlay" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon id="playIcon" points="5,3 19,12 5,21"/></svg>
      <span id="playLabel">Play</span>
    </button>
    <button class="btn btn-stop" id="btnStop" disabled>Stop</button>
    <button class="btn btn-stop" id="btnSkipEnd" disabled title="Skip to end">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="4,4 15,12 4,20"/><rect x="18" y="4" width="3" height="16"/></svg>
    </button>

    <span class="divider"></span>

    <div class="tempo-group">
      <label>Tempo</label>
      <input type="range" id="tempoSlider" min="25" max="200" value="100">
      <span class="tempo-value" id="tempoValue">100%</span>
    </div>
  </div>

  <span class="status" id="status"></span>
</header>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div id="sidebar" class="collapsed">
  <ul id="song-list"></ul>
</div>

<div id="score-container">
  <div id="score-meta" hidden>
    <h1 id="metaTitle"></h1>
    <p id="metaComposer"></p>
    <p id="metaArranger"></p>
  </div>
  <div id="notation">
    <div class="empty-state" id="emptyState">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
      <h2>Open a MusicXML score</h2>
      <p>
        Export from MuseScore via File → Export → MusicXML,
        then open the file here to follow along.
      </p>
      <div class="formats">
        <span class="format-tag">.musicxml</span>
        <span class="format-tag">.xml</span>
        <span class="format-tag">.mxl</span>
      </div>
    </div>
  </div>
</div>

<script src="lib/verovio-toolkit-wasm.js" defer></script>
<script src="lib/soundfont-player.min.js" defer></script>
<script src="index.js" defer></script>

</body>
</html>
